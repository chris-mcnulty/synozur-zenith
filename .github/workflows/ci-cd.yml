# GitHub Actions CI/CD Pipeline for Synozur Zenith
# Builds a Docker image and deploys to Azure App Service (Linux container)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE_NAME: synozur-zenith
  NODE_VERSION: '20.x'
  ACR_LOGIN_SERVER: synozuracr.azurecr.io

jobs:
  # ========================================
  # Job 1 — CI: Build & Validate
  # ========================================
  build:
    name: 'Build, type-check, and package'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
        name: Install dependencies

      - run: npm run check
        name: TypeScript type check

      - run: npm run build
        name: Production build (Vite + esbuild)

      - uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: dist/

  # ========================================
  # Job 2 — Build & Push Docker Image
  # ========================================
  docker:
    name: 'Build & push Docker image'
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }} .
          docker tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }} ${{ env.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest
        name: Build and push to ACR

  # ========================================
  # Job 3 — Deploy to Azure
  # ========================================
  deploy:
    name: 'Deploy to Azure App Service'
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
        name: Install dependencies (for drizzle-kit)

      - run: npx drizzle-kit push
        name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.APP_SERVICE_NAME }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}
